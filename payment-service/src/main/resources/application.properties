spring.application.name=payment-service
server.port=8086

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:mysql://localhost:3306/payment_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# JWT Configuration
jwt.secret=YourSecretKeyYourSecretKeyYourSecretKey123456789012345678901234567890

# Logging Configuration
logging.level.root=INFO
logging.level.com.payment=DEBUG

# RabbitMQ Configuration
rabbitmq.exchange=railnova-exchange
rabbitmq.queue=payment-notification-queue
rabbitmq.routingKey=payment.success

# Razorpay Configuration (Test Mode)
# Replace with your actual test credentials from: https://dashboard.razorpay.com/app/website-app-settings/api-keys
# For testing, you can use these demo credentials:
razorpay.key.id=rzp_test_1DP5mmOlF5G5ag
razorpay.key.secret=thisissecretkey

# Springdoc Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized