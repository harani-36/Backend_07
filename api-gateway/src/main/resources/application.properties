spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Global CORS Configuration
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173,http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# API Docs Routes for Swagger Aggregation
spring.cloud.gateway.routes[0].id=auth-docs
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}

spring.cloud.gateway.routes[1].id=train-docs
spring.cloud.gateway.routes[1].uri=lb://TRAIN-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/train-service/v3/api-docs
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/train-service/(?<segment>.*), /${segment}

